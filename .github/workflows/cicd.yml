name: ci

on:
  push:
    branches: ["dev-me"]

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            nhcuong/portfolio
          # generate Docker tags based on the following events/attributes
          tags: |
            type=ref,event=branch
            type=sha

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate build configuration
        uses: docker/build-push-action@v7
        with:
          call: check

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST_VIETNIX }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.prod.yaml"
          target: "/app/portfolio"
        
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Lấy chính xác version mà bước 'meta' đã xác định
          DEPLOY_TAG: ${{ steps.meta.outputs.version }}
        with:
          host: ${{ secrets.SSH_HOST_VIETNIX }}
          username: ${{ secrets.SSH_USER }}
          envs: DEPLOY_TAG
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export TAG=$DEPLOY_TAG
          
            cd /app/portfolio
            mv compose.prod.yaml compose.yaml
            docker compose pull
            docker compose up -d
            docker image prune -af  # Xóa image cũ để tiết kiệm ổ cứng VPS